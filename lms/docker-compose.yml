version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: arun586/ken-frontend:prod
    ports:
      - "80:80"  # Serve frontend on port 80 (default HTTP)
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: arun586/ken-backend:prod
    expose:
      - "5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - STRIPE_SECRET_KEY=sk_test_1234567890
    command: node server.js
