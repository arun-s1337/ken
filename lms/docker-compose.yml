version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    image: arun586/ken-backend:ci
    container_name: lms-backend
    environment:
      - NODE_ENV=production
    ports:
      - "5000:5000"
    healthcheck:
      # BusyBox wget is available in alpine
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000/"]
      interval: 10s
      timeout: 5s
      retries: 8

  frontend:
    build:
      context: ./frontend
      dockerfile: dockerfile
    image: arun586/ken-frontend:ci
    container_name: lms-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
