version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: dockerfile
    image: arun586/ken-frontend:ci
    ports:
      - "80:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    image: arun586/ken-backend:ci
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
