version: "3.9"

services:
  frontend:
    build:
      context: ./lms      # Ensure the correct build context
      dockerfile: frontend/dockerfile
    image: arun586/ken-frontend:prod
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    build:
      context: ./lms      # Ensure the correct build context
      dockerfile: backend/dockerfile
    image: arun586/ken-backend:prod
    expose:
      - "5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
